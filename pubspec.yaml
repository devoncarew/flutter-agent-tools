name: flutter_agent_tools
description: >-
  A Claude Code plugin to make AI coding agents more effective for Dart and
  Flutter projects.

# Versioning for the plugin is tracked at .claude-plugin/plugin.json.
publish_to: none

repository: https://github.com/devoncarew/flutter-agent-tools

environment:
  sdk: ^3.7.0

dependencies:
  analyzer: ^12.0.0
  collection: ^1.19.1
  dart_mcp: ^0.5.0
  http: ^1.6.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  vm_service: ^15.0.2
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  stream_channel: ^2.1.0
  test: ^1.25.0
