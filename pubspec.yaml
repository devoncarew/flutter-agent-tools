name: flutter_slipstream
description: >-
  Live Flutter app introspection for coding agents: screenshots, widget-tree
  inspection, tap/type/scroll, and error capture. Dart package API summarization
  for agents.

# Version is tracked at .claude-plugin/plugin.json.
publish_to: none

repository: https://github.com/devoncarew/flutter-slipstream

environment:
  sdk: ^3.7.0

dependencies:
  analyzer: ^12.0.0
  collection: ^1.19.0
  dart_mcp: ^0.5.0
  path: ^1.9.0
  vm_service: ^15.0.0
  yaml: ^3.1.0

dev_dependencies:
  args: ^2.7.0
  http: ^1.6.0
  lints: ^6.0.0
  stream_channel: ^2.1.0
  test: ^1.25.0
