name: CI
permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1

      # Check the shell scripts.
      - run: bash -n scripts/deps_check.sh
      - run: bash -n scripts/inspector_mcp.sh
      - run: bash -n scripts/packages_mcp.sh

      - run: dart pub get

      # Validate manifests.
      - run: dart run tool/validate_manifest.dart .claude-plugin/plugin.json
      - run: dart run tool/validate_manifest.dart gemini-extension.json

      # Dart checks.
      - run: dart analyze
      - run: dart format --output=none --set-exit-if-changed bin/ lib/ test/
      - run: dart test
