name: CI
permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1

      # Check the shell scripts.
      - run: bash -n scripts/dep_health_check.sh
      - run: bash -n scripts/pubspec_guard.sh

      # Dart checks.
      - run: dart pub get
      - run: dart analyze
      - run: dart format --output=none --set-exit-if-changed bin/ lib/ test/
      - run: dart test
